<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>DeustoBank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>DeustoBank</h1>
</header>

<div class="main-container" style="max-width: 400px; margin-top: 80px;">
    <div class="section-card" style="text-align: center;">

        <div style="display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee;">
            <div id="tab-login" class="btn" style="background:none; color:var(--deusto-blue); border-bottom: 2px solid var(--deusto-blue);" onclick="showLogin()">Entrar</div>
            <div id="tab-reg" class="btn" style="background:none; color:#666;" onclick="showRegister()">Nuevo Cliente</div>
        </div>

        <div id="login-section">
            <h2>Acceso Clientes</h2>
            <input type="text" id="login-dni" placeholder="DNI">
            <input type="password" id="login-password" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="loginReal()">Entrar</button>
        </div>

        <div id="register-section" style="display:none;">
            <h2>Crear Cuenta</h2>
            <input type="text" id="reg-name" placeholder="Nombre completo">
            <input type="text" id="reg-dni" placeholder="DNI">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Contraseña">
            <button class="btn btn-success" onclick="registrarReal()">Registrarme</button>
        </div>

    </div>
</div>

<script>

function showRegister() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('register-section').style.display = 'block';
}

function showLogin() {
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('register-section').style.display = 'none';
}

(function checkAlreadyLoggedIn() {
    const userId = sessionStorage.getItem('userId');
    const role   = sessionStorage.getItem('userRole');
    const token  = sessionStorage.getItem('sessionToken');
    if (userId && token) {
        window.location.replace(role === 'ADMIN' ? 'admin.html' : 'dashboard.html');
    }
})();

async function loginReal() {
    const dni = document.getElementById('login-dni').value;
    const password = document.getElementById('login-password').value;

    if (!dni || !password) {
        alert("Rellena todos los campos");
        return;
    }

    const response = await fetch(`/auth/login?dni=${encodeURIComponent(dni)}&password=${encodeURIComponent(password)}`, {
        method: 'POST'
    });

    if (response.ok) {
        const user = await response.json();

        const sessionToken = crypto.randomUUID();
        sessionStorage.setItem('userId', user.id);
        sessionStorage.setItem('userRole', user.role);
        sessionStorage.setItem('sessionToken', sessionToken);

        if (user.role === 'ADMIN') {
            window.location.replace('admin.html');
        } else {
            window.location.replace('dashboard.html');
        }
    } else {
        const msg = await response.text();
        if (msg.includes("CUENTA_BLOQUEADA")) {
            alert("Tu cuenta ha sido bloqueada por demasiados intentos fallidos. Contacta con tu banco.");
        } else if (msg.includes("Intentos restantes")) {
            alert(msg);
        } else {
            alert("DNI o contraseña incorrectos");
        }
    }
}

async function registrarReal() {
    const user = {
        fullName: document.getElementById('reg-name').value,
        dni: document.getElementById('reg-dni').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value
    };

    if (!user.fullName || !user.dni || !user.email || !user.password) {
        alert("Completa todos los campos");
        return;
    }

    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        });

        if (response.ok) {
            alert("Usuario creado correctamente");
            showLogin();
        } else {
            const msg = await response.text();
            alert("Error: " + msg);
        }

    } catch (e) {
        alert("Error de conexión");
    }
}
</script>

</body>
</html>
