<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoBank - Mi Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>DeustoBank Online</h1>
        <button onclick="cerrarSesion()" style="position: absolute; right: 20px; top: 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Cerrar Sesión</button>
    </header>

    <div class="main-container">
        
        <section class="section-card">
            <h2>Resumen de Cuenta</h2>
            <div id="account-info" class="account-details">
                <p>Cargando datos...</p>
            </div>
        </section>

        <section class="section-card">
            <h2>Operaciones Rápidas</h2>
            <div class="ops-grid">
                <div>
                    <label>Cantidad (€):</label>
                    <input type="number" id="operation-amount" placeholder="0.00" min="0.01" step="0.01">
                </div>
                <div class="btn-group-vertical">
                    <button class="btn btn-deposit" onclick="operar('deposit')">Ingresar dinero</button>
                    <button class="btn btn-withdraw" onclick="operar('withdraw')">Retirar dinero</button>
                </div>
            </div>
        </section>

        <section class="section-card transfer-card">
            <h2>Transferencia entre cuentas</h2>
            <div class="form-group">
                <label>ID Cuenta Destino:</label>
                <input type="number" id="destination-id" placeholder="ID del receptor">
                <button class="btn btn-transfer" onclick="transferir()">Ejecutar Transferencia</button>
            </div>
        </section>

        <section class="section-card delete-zone" style="border: 1px solid #f8d7da; background-color: #fff5f5;">
            <h3>Zona de Peligro</h3>
            <p style="font-size: 0.9em; color: #666;">Para cerrar la cuenta no debes tener deudas pendientes.</p>
            <button class="btn btn-danger" onclick="eliminarCuenta()">Eliminar esta cuenta para siempre</button>
        </section>

    </div>

    <script>
        // 1. Al cargar la página, verificamos si hay sesión y cargamos datos
        window.onload = function() {
            const id = sessionStorage.getItem('usuarioId');
            if (!id) {
                alert("Acceso denegado. Por favor, inicia sesión.");
                window.location.href = 'index.html';
                return;
            }
            actualizarDatos();
        };

        // 2. Obtener datos de la cuenta desde el Backend
        async function actualizarDatos() {
            const id = sessionStorage.getItem('usuarioId');
            try {
                const response = await fetch(`/accounts/${id}`);
                if (!response.ok) throw new Error("No se pudo obtener la cuenta");
                
                const cuenta = await response.json();
                document.getElementById('account-info').innerHTML = `
                    <p><strong>Titular:</strong> ${cuenta.ownerName}</p>
                    <p><strong>Saldo Actual:</strong> <span style="font-size: 1.5em; color: var(--deusto-blue);">${cuenta.balance.toFixed(2)} €</span></p>
                    <p><small>ID de cuenta: ${cuenta.id}</small></p>
                `;
            } catch (error) {
                console.error("Error:", error);
                alert("Error al conectar con el banco.");
            }
        }

        // 3. Ingresos y Retiradas (PUT /accounts/{id}/deposit?amount=X)
        async function operar(tipo) {
            const id = sessionStorage.getItem('usuarioId');
            const cantidad = document.getElementById('operation-amount').value;
            
            if (!cantidad || cantidad <= 0) {
                alert("Introduce una cantidad válida mayor que 0");
                return;
            }

            try {
                const response = await fetch(`/accounts/${id}/${tipo}?amount=${cantidad}`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    alert("Operación realizada con éxito");
                    document.getElementById('operation-amount').value = ''; // Limpiar input
                    actualizarDatos();
                } else {
                    const errorMsg = await response.text();
                    alert("Error: " + (errorMsg || "Saldo insuficiente o cantidad inválida"));
                }
            } catch (e) {
                alert("Error de conexión");
            }
        }

        // 4. Transferencias (POST /accounts/transfer?fromId=X&toId=Y&amount=Z)
        async function transferir() {
            const fromId = sessionStorage.getItem('usuarioId');
            const toId = document.getElementById('destination-id').value;
            const cantidad = document.getElementById('operation-amount').value;

            if (!toId || !cantidad || cantidad <= 0) {
                alert("Necesitas indicar el ID destino y la cantidad (en el cuadro de arriba)");
                return;
            }

            try {
                const response = await fetch(`/accounts/transfer?fromId=${fromId}&toId=${toId}&amount=${cantidad}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert("¡Transferencia realizada!");
                    document.getElementById('destination-id').value = '';
                    document.getElementById('operation-amount').value = '';
                    actualizarDatos();
                } else {
                    alert("Error en la transferencia. Verifica el ID destino y tu saldo.");
                }
            } catch (e) {
                alert("Error de conexión");
            }
        }

        // 5. Eliminar Cuenta (DELETE /accounts/{id})
        async function eliminarCuenta() {
            const id = sessionStorage.getItem('usuarioId');
            if (!confirm("¿Estás seguro? Esta acción no se puede deshacer.")) return;

            try {
                const response = await fetch(`/accounts/${id}`, { method: 'DELETE' });
                const msg = await response.text();

                if (response.ok) {
                    alert(msg);
                    cerrarSesion();
                } else {
                    alert("No se pudo eliminar: " + msg);
                }
            } catch (e) {
                alert("Error al intentar eliminar la cuenta.");
            }
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
