<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - DeustoBank</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>DeustoBank - Administración</h1>
    </header>

    <div class="main-container">
        <div class="section-card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px;">
                <h2 style="border: none; margin: 0;">Usuarios Registrados</h2>
                <button class="btn btn-secondary" style="width: auto; padding: 8px 15px;"
                    onclick="window.location.href='index.html'">Volver al inicio</button>
            </div>

            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                    <thead>
                        <tr style="background-color: var(--deusto-blue); color: white;">
                            <th style="padding: 12px; text-align: left;">ID</th>
                            <th style="padding: 12px; text-align: left;">Nombre Completo</th>
                            <th style="padding: 12px; text-align: left;">DNI</th>
                            <th style="padding: 12px; text-align: left;">Email</th>
                            <th style="padding: 12px; text-align: left;">Rol</th>
                            <th style="padding: 12px; text-align: left;">Estado</th>
                            <th style="padding: 12px; text-align: left;">Saldo</th>
                            <th style="padding: 12px; text-align: left;">Transacciones</th>
                            <th style="padding: 12px; text-align: left;">Acción</th>
                            <th style="padding: 12px; text-align: left;">Contraseña</th>
                        </tr>
                    </thead>
                    <tbody id="usuarios-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', cargarUsuarios);

        async function cargarUsuarios() {
            try {
                const requesterId = sessionStorage.getItem('userId');
                if (!requesterId) {
                    alert('Debes iniciar sesión primero para acceder al panel de administración.');
                    window.location.href = 'index.html';
                    return;
                }

                const response = await fetch('/api/admin/users?requesterId=' + requesterId);

                if (response.ok) {
                    const users = await response.json();
                    const tableBody = document.getElementById('usuarios-table-body');
                    tableBody.innerHTML = '';

                    if (users.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center;">No hay usuarios registrados.</td></tr>';
                        return;
                    }

                    for (const user of users) {

                        // 🔥 LLAMADA NUEVA AL BACKEND
                        let totalBalance = 0;
                        let transactions = 0;

                        try {
                            const summaryRes = await fetch(`/api/admin/users/${user.id}/summary?requesterId=${requesterId}`);
                            if (summaryRes.ok) {
                                const summary = await summaryRes.json();
                                totalBalance = summary.totalBalance;
                                transactions = summary.transactions;
                            }
                        } catch (e) {
                            console.error("Error obteniendo resumen", e);
                        }

                        const tr = document.createElement('tr');
                        tr.style.borderBottom = '1px solid #ddd';

                        const roleFormatted = user.role === 'ADMIN' ?
                            '<span style="background: var(--deusto-blue); color: white; padding: 3px 8px; border-radius: 12px;">ADMIN</span>' :
                            '<span style="background: #6c757d; color: white; padding: 3px 8px; border-radius: 12px;">USER</span>';

                        const statusFormatted = user.active ?
                            '<span style="background: #28a745; color: white; padding: 3px 8px; border-radius: 12px;">ACTIVO</span>' :
                            '<span style="background: #dc3545; color: white; padding: 3px 8px; border-radius: 12px;">BLOQUEADO</span>';

                        const buttonAction = user.active ?
                            `<button onclick="cambiarEstado(${user.id}, true)" style="background: #dc3545; color: white;">Bloquear</button>` :
                            `<button onclick="cambiarEstado(${user.id}, false)" style="background: #28a745; color: white;">Desbloquear</button>`;

                        // 🔥 NUEVAS COLUMNAS
                        tr.innerHTML = `
                            <td>${user.id}</td>
                            <td><b>${user.fullName}</b></td>
                            <td>${user.dni}</td>
                            <td>${user.email}</td>
                            <td>${roleFormatted}</td>
                            <td>${statusFormatted}</td>
                            <td><b>${totalBalance.toFixed(2)} €</b></td>
                            <td>${transactions}</td>
                            <td>${buttonAction}</td>
                            <td><button class="btn btn-warning" onclick="resetPassword(${user.id})">Resetear</button></td>
                            `;

                        tableBody.appendChild(tr);
                    }

                } else {
                    alert('Error al obtener la lista de usuarios');
                }

            } catch (e) {
                console.error(e);
                alert('Error de conexión servidor');
            }
        }

        async function cambiarEstado(userId, currentStatus) {
            const requesterId = sessionStorage.getItem('userId');
            const accion = currentStatus ? "bloquear" : "desbloquear";

            if (confirm(`¿Estás seguro de que quieres ${accion} a este usuario?`)) {
                try {
                    const response = await fetch(`/api/admin/users/${userId}/status?requesterId=${requesterId}`, {
                        method: 'PUT'
                    });

                    if (response.ok) {
                        cargarUsuarios();
                    } else {
                        alert("Error al cambiar estado");
                    }

                } catch (e) {
                    console.error(e);
                    alert('Error de conexión');
                }
            }
        }
        async function resetPassword(userId) {
            const requesterId = sessionStorage.getItem('userId');

            if (!confirm("¿Resetear la contraseña de este usuario?")) return;

            try {
                const response = await fetch(`/api/admin/users/${userId}/reset-password?requesterId=${requesterId}`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(`Contraseña reseteada correctamente.\nNueva contraseña temporal: ${data.nuevaPassword}`);
                } else {
                    alert("Error al resetear la contraseña");
                }

            } catch (e) {
                alert("Error de conexión");
            }
        }
    </script>

</body>

</html>
