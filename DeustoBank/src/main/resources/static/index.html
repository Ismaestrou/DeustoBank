<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido - DeustoBank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>DeustoBank</h1>
    </header>

    <div class="main-container" style="max-width: 400px; margin-top: 80px;">
        <div class="section-card" style="text-align: center;">
            <div style="display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee;">
                <div id="tab-login" class="btn" style="background:none; color:var(--deusto-blue); border-bottom: 2px solid var(--deusto-blue);" onclick="showLogin()">Entrar</div>
                <div id="tab-reg" class="btn" style="background:none; color:#666;" onclick="showRegister()">Nuevo Cliente</div>
            </div>

            <div id="login-section">
                <h2>Acceso Clientes</h2>
                <input type="number" id="login-id" placeholder="Introduce tu ID de cuenta">
                <button class="btn btn-primary" onclick="loginReal()">Entrar al Panel</button>
            </div>

            <div id="register-section" style="display:none;">
                <h2>Crear Cuenta</h2>
                <input type="text" placeholder="Nombre completo">
                <input type="number" placeholder="Depósito inicial (€)">
                <button class="btn btn-success" onclick="registrarReal()">Registrarme</button>
            </div>
        </div>
    </div>

    <script>
        // Funciones simples para cambiar de pestaña
        function showRegister() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
            document.getElementById('tab-reg').style.color = 'var(--deusto-blue)';
            document.getElementById('tab-reg').style.borderBottom = '2px solid var(--deusto-blue)';
            document.getElementById('tab-login').style.color = '#666';
            document.getElementById('tab-login').style.borderBottom = 'none';
        }

        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('tab-login').style.color = 'var(--deusto-blue)';
            document.getElementById('tab-login').style.borderBottom = '2px solid var(--deusto-blue)';
            document.getElementById('tab-reg').style.color = '#666';
            document.getElementById('tab-reg').style.borderBottom = 'none';
        }
        async function loginReal() {
            const id = document.getElementById('login-id').value;
            
            if (!id) {
                alert("Por favor, introduce un ID");
                return;
            }

            try {
                // Llamamos a tu GetMapping("/{id}") de Java
                const response = await fetch(`/accounts/${id}`);
                
                if (response.ok) {
                    const cuenta = await response.json();
                    // Guardamos el ID en la memoria del navegador para saber quién entró
                    sessionStorage.setItem('usuarioId', cuenta.id);
                    // Si existe, vamos al panel
                    window.location.href = 'dashboard.html';
                } else {
                    alert("ID de cuenta no encontrado. ¡Regístrate si eres nuevo!");
                }
            } catch (error) {
                console.error("Error al conectar con el servidor:", error);
                alert("El servidor no responde. ¿Has arrancado la aplicación en Java?");
            }
        }
    async function registrarReal() {
        // Buscamos los inputs dentro del div de registro
        const section = document.getElementById('register-section');
        const inputs = section.querySelectorAll('input');
        
        const nombre = inputs[0].value; // El primer input es el texto
        const saldo = inputs[1].value; // El segundo es el número

        if (!nombre || !saldo) {
            alert("Por favor, rellena todos los campos");
            return;
        }

        const nuevaCuenta = {
            ownerName: nombre,
            balance: parseFloat(saldo)
        };

        try {
            const response = await fetch('/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevaCuenta)
            });

            if (response.ok) {
                const cuentaCreada = await response.json();
                alert(`¡Cuenta creada con éxito!\nTu ID de acceso es: ${cuentaCreada.id}\n\nGuarda este número para entrar.`);
                showLogin(); 
            } else {
                // Esto nos dirá qué dice el error de Java (ej: saldo negativo)
                const errorText = await response.text();
                alert("Error del servidor: " + errorText);
            }
        } catch (error) {
            alert("No se pudo conectar con el servidor. Asegúrate de que Java está corriendo.");
        }
    }
    </script>
</body>
</html>
