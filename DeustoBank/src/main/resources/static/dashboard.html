<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoBank - Mi Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>DeustoBank Online</h1>
    <button onclick="cerrarSesion()" 
        style="position: absolute; right: 20px; top: 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
        Cerrar Sesión
    </button>
</header>

<div class="main-container">
    
    <section class="section-card">
        <h2>Resumen de Cuenta</h2>
        <div id="account-info" class="account-details">
            <p>Cargando datos...</p>
        </div>
    </section>

    <section class="section-card">
        <h2>Operaciones Rápidas</h2>
        <div class="ops-grid">
            <div>
                <label>Cantidad (€):</label>
                <input type="number" id="operation-amount" placeholder="0.00" min="0.01" step="0.01">
            </div>
            <div class="btn-group-vertical">
                <button class="btn btn-deposit" onclick="operar('deposit')">Ingresar dinero</button>
                <button class="btn btn-withdraw" onclick="operar('withdraw')">Retirar dinero</button>
            </div>
        </div>
    </section>

	<section class="section-card transfer-card">
	    <h2>Transferencia entre cuentas</h2>

	    <div class="form-group">
	        <label>ID Cuenta Destino:</label>
	        <input type="number" id="destination-id" placeholder="ID del receptor">
	    </div>

	    <div class="form-group">
	        <label>Cantidad (€):</label>
	        <input type="number" id="transfer-amount" placeholder="0.00" min="0.01" step="0.01">
	    </div>

	    <button class="btn btn-transfer" onclick="transferir()">Ejecutar Transferencia</button>
	</section>
    <section class="section-card">
        <h2>Historial de Movimientos</h2>
        <div class="ops-grid" style="margin-bottom: 15px;">
            <div class="form-group">
                <label>Fecha inicio:</label>
                <input type="date" id="filter-from">
            </div>
            <div class="form-group">
                <label>Fecha fin:</label>
                <input type="date" id="filter-to">
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-primary" style="width: auto; padding: 10px 20px;" onclick="cargarHistorial()">Aplicar filtro</button>
            <button class="btn btn-secondary" style="width: auto; padding: 10px 20px;" onclick="limpiarFiltro()">Ver todos</button>
        </div>
        <div id="transaction-list">
            <p style="color: #999;">Pulsa "Ver todos" para cargar el historial.</p>
        </div>
    </section>   
    <section class="section-card delete-zone">
        <h3>Zona de Peligro</h3>
        <p style="font-size: 0.9em; color: #666;">
            Para cerrar la cuenta no debes tener deudas pendientes.
        </p>
        <button class="btn btn-danger" onclick="eliminarCuenta()">
            Eliminar esta cuenta para siempre
        </button>
    </section>

</div>

<script>

// INICIO
window.onload = async function () {
    const userId = sessionStorage.getItem('userId');

    if (!userId) {
        alert("Debes iniciar sesión");
        window.location.href = 'index.html';
        return;
    }

    try {
        const response = await fetch(`/accounts/user/${userId}`);
        const accounts = await response.json();

        if (!accounts.length) {
            alert("No tienes cuentas");
            return;
        }

        const cuenta = accounts[0];

        sessionStorage.setItem('accountId', cuenta.id);

        actualizarDatos();

    } catch (e) {
        alert("Error cargando cuentas");
    }
};

// OBTENER DATOS
async function actualizarDatos() {
    const id = sessionStorage.getItem('accountId');

    try {
        const response = await fetch(`/accounts/${id}`);

        if (!response.ok) throw new Error();

        const cuenta = await response.json();

        let extraAlert = '';
        let colorClass = 'var(--deusto-blue)';
        let displayBalance = cuenta.balance;

        if (cuenta.balance < 0) {
            colorClass = '#d9534f'; 
            extraAlert = `<div style="background: #ffebee; color: #c62828; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ef5350;">
                            <strong>¡Alerta de Deuda!</strong> Tu saldo es negativo. Tienes una deuda pendiente de <strong>${Math.abs(cuenta.balance).toFixed(2)} €</strong>. 
                            Por favor, realiza un ingreso lo antes posible.
                          </div>`;
        }

        document.getElementById('account-info').innerHTML = `
            ${extraAlert}
            <p><strong>Titular:</strong> ${cuenta.ownerName}</p>
            <p><strong>Saldo:</strong> 
                <span style="font-size:1.8em; color: ${colorClass}; font-weight: bold;">
                    ${displayBalance.toFixed(2)} €
                </span>
            </p>
            <p><small>ID: ${cuenta.id}</small></p>
        `;

    } catch (e) {
        alert("Error al cargar datos");
    }
}

// OPERAR (DEPOSIT / WITHDRAW)
async function operar(tipo) {
    const id = sessionStorage.getItem('accountId');
    const cantidad = document.getElementById('operation-amount').value;

    if (!cantidad || cantidad <= 0) {
        alert("Cantidad inválida");
        return;
    }

    try {
        const response = await fetch(`/accounts/${id}/${tipo}?amount=${cantidad}`, {
            method: 'PUT'
        });

        if (response.ok) {
            alert("Operación realizada");
            document.getElementById('operation-amount').value = '';
            actualizarDatos();
        } else {
            const msg = await response.text();
            alert(msg || "Error en operación");
        }

    } catch (e) {
        alert("Error de conexión");
    }
}

// TRANSFERENCIA
async function transferir() {
    const fromId = sessionStorage.getItem('accountId'); // ✅ cuenta actual
    const toId = document.getElementById('destination-id').value;
    const amount = document.getElementById('transfer-amount').value;

    if (!fromId) {
        alert("Error: no hay cuenta activa");
        return;
    }

    if (!toId || !amount || amount <= 0) {
        alert("Introduce un ID destino y una cantidad válida");
        return;
    }

    try {
        const response = await fetch(
            `/accounts/transfer?fromId=${fromId}&toId=${toId}&amount=${amount}`,
            {
                method: 'POST'
            }
        );

        if (response.ok) {
            alert("Transferencia realizada correctamente");

            // limpiar inputs
            document.getElementById('destination-id').value = '';
            document.getElementById('transfer-amount').value = '';

            actualizarDatos();
        } else {
            const msg = await response.text();
            alert("Error: " + msg);
        }

    } catch (error) {
        alert("Error de conexión con el servidor");
    }
}

// ELIMINAR CUENTA
async function eliminarCuenta() {
    const id = sessionStorage.getItem('accountId');

    if (!confirm("¿Seguro? Esta acción no se puede deshacer")) return;

    try {
        const response = await fetch(`/accounts/${id}`, {
            method: 'DELETE'
        });

        const msg = await response.text();

        if (response.ok) {
            alert(msg);
            cerrarSesion();
        } else {
            alert(msg);
        }

    } catch (e) {
        alert("Error eliminando cuenta");
    }
}
// HISTORIAL
async function cargarHistorial() {
    const id = sessionStorage.getItem('accountId');
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;

    if (!from || !to) {
        alert("Selecciona fecha inicio y fecha fin");
        return;
    }

    if (from > to) {
        alert("La fecha inicio no puede ser posterior a la fecha fin");
        return;
    }

    try {
        const response = await fetch(`/accounts/${id}/transactions?from=${from}&to=${to}`);
        const movimientos = await response.json();
        renderizarHistorial(movimientos);
    } catch (e) {
        alert("Error cargando historial");
    }
}

async function limpiarFiltro() {
    const id = sessionStorage.getItem('accountId');
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';

    try {
        const response = await fetch(`/accounts/${id}/transactions`);
        const movimientos = await response.json();
        renderizarHistorial(movimientos);
    } catch (e) {
        alert("Error cargando historial");
    }
}

function renderizarHistorial(movimientos) {
    const contenedor = document.getElementById('transaction-list');

    if (!movimientos.length) {
        contenedor.innerHTML = '<p style="color: #999;">No hay movimientos en este período.</p>';
        return;
    }

    const tipoLabel = {
        DEPOSIT: 'Ingreso',
        WITHDRAW: 'Retirada',
        TRANSFER_IN: 'Transferencia recibida',
        TRANSFER_OUT: 'Transferencia enviada'
    };
    const tipoColor = {
        DEPOSIT: '#5cb85c',
        WITHDRAW: '#f0ad4e',
        TRANSFER_IN: '#5bc0de',
        TRANSFER_OUT: '#d9534f'
    };

    contenedor.innerHTML = movimientos.map(m => {
        const fecha = new Date(m.date).toLocaleString('es-ES');
        const label = tipoLabel[m.type] || m.type;
        const color = tipoColor[m.type] || '#333';
        return `<div style="border-left: 4px solid ${color}; padding: 10px 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 0 6px 6px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong style="color:${color}">${label}</strong>
                <span style="font-size:1.1em; font-weight:bold;">${m.amount.toFixed(2)} €</span>
            </div>
            <div style="font-size:0.85em; color:#666; margin-top:4px;">
                ${fecha} &nbsp;|&nbsp; Saldo: ${m.balanceBefore.toFixed(2)} € → ${m.balanceAfter.toFixed(2)} €
            </div>
        </div>`;
    }).join('');
}
// LOGOUT
function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = 'index.html';
}

</script>

</body>
</html>
